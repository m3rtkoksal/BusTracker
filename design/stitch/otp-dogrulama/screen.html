<style>

<body class="bg-background text-on-background font-body min-h-screen overflow-hidden">

<div class="fixed inset-0 flex flex-col items-center justify-center pointer-events-none opacity-20">

                    </p>

<div class="w-24 h-24 border-r-2 border-t-2 border-secondary/40 rounded-tr-3xl"></div>

<script>
        // Micro-interactions for OTP Inputs
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.key >= 0 && e.key <= 9) {
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                } else if (e.key === 'Backspace') {
                    if (index > 0) {
                        inputs[index - 1].focus();
                    }
                }
            });

            // Focus animation effect
            input.addEventListener('focus', () => {
                input.parentElement.style.gap = '12px';
            });
            input.addEventListener('blur', () => {
                input.parentElement.style.gap = '8px';
            });
        });

        // Simple Countdown logic
        let timeLeft = 120;
        const timerEl = document.getElementById('timer');
        const countdown = setInterval(() => {
            if(timeLeft <= 0) clearInterval(countdown);
            timeLeft--;
            timerEl.textContent = `TTL: ${timeLeft}s`;
            if(timeLeft < 30) timerEl.classList.add('text-error');
        }, 1000);

        // Visual feedback for successful input simulation
        document.querySelector('button').addEventListener('click', () => {
            const btnText = document.querySelector('button span.relative');
            btnText.textContent = 'SYSTEM_VERIFYING...';
            setTimeout(() => {
                btnText.textContent = 'ACCESS_GRANTED';
                btnText.classList.remove('text-primary');
                btnText.classList.add('text-secondary');
            }, 1500);
        });
    </script>
